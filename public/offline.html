<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Scholar's Circle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A0D13;
      color: #e8eaf6;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 420px;
    }
    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }
    h1 { font-size: 22px; margin-bottom: 8px; }
    p { font-size: 14px; color: #9ca3af; line-height: 1.6; margin-bottom: 20px; }
    button {
      background: #6366f1;
      color: #fff;
      border: none;
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #4f46e5; }
    .features {
      margin-top: 28px;
      text-align: left;
      background: #151a24;
      border: 1px solid #1e2140;
      border-radius: 12px;
      padding: 16px 20px;
    }
    .features h3 { font-size: 13px; color: #a5b4fc; margin-bottom: 10px; }
    .features li {
      list-style: none;
      font-size: 13px;
      color: #9ca3af;
      padding: 6px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .features li::before { content: "✓"; color: #4ade80; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📚</div>
    <h1>You're Offline</h1>
    <p>No internet connection detected. Don't worry — you can still study with cached content.</p>
    <button onclick="window.location.reload()">Try Again</button>
    <div class="features">
      <h3>Available Offline</h3>
      <ul>
        <li>Cached subjects & quizzes</li>
        <li>Your notes & flashcards</li>
        <li>Study progress & stats</li>
        <li>Timetable & reminders</li>
      </ul>
    </div>
  </div>
</body>
</html>
