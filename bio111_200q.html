<script>
const ALLQ = [
{q:"Vertebrates belong to which Sub-Phylum?",o:["Vertebrata (Craniata)","Urochordata","Cephalochordata","Hemichordata"],a:0,e:"Vertebrates are placed in the Sub-Phylum Vertebrata, also called Craniata because they possess a cranium (brain box). They are the most advanced group of animals in Phylum Chordata."},
{q:"Which structure replaces the notochord in adult vertebrates?",o:["Vertebral column (backbone)","Cranium","Spinal cord","Exoskeleton"],a:0,e:"In vertebrates, the vertebral column (backbone) made of vertebrae replaces the notochord. The notochord is only present during the embryonic stage."},
{q:"The heart of Class Pisces (bony fishes) has how many chambers?",o:["Two chambers","Three chambers","Four chambers","One chamber"],a:0,e:"Fishes have a two-chambered heart consisting of one atrium and one ventricle. This is a key distinguishing feature compared to amphibians (3) and birds/mammals (4)."},
{q:"What organ in bony fishes controls buoyancy?",o:["Swim bladder","Lateral line","Operculum","Ampullae of Lorenzini"],a:0,e:"The swim bladder in bony fishes controls buoyancy by regulating the amount of gas inside it, allowing the fish to rise or sink to different depths without expending energy."},
{q:"Class Amphibia are described as 'poikilothermic.' This means they are:",o:["Cold-blooded (body temperature varies with environment)","Warm-blooded (constant body temperature)","Semi-warm-blooded","Unable to thermoregulate completely"],a:0,e:"Poikilothermic (also called ectothermic) means the animal's body temperature changes with the environmental temperature. Amphibians, fishes, and reptiles are all cold-blooded (poikilothermic)."},
{q:"Which type of fertilization occurs in most amphibians?",o:["External fertilization","Internal fertilization","Parthenogenesis","Self-fertilization"],a:0,e:"Most amphibians practice external fertilization, where eggs are fertilized outside the body, typically in water. This is why amphibians must return to water to reproduce."},
{q:"What is the larval stage of a frog called?",o:["Tadpole","Caterpillar","Nauplius","Nymph"],a:0,e:"The larval stage of a frog is called a tadpole. It is fully aquatic, breathes through gills, and has a tail. It undergoes metamorphosis to develop into the adult frog with lungs and limbs."},
{q:"Reptiles are described as 'fully terrestrial.' Which adaptation makes their eggs independent of water?",o:["Amniotic egg with leathery shell and protective membranes","External fertilization","Metamorphosis stage","Cutaneous respiration"],a:0,e:"The amniotic egg has protective membranes (amnion, chorion, allantois) and a leathery shell that prevents desiccation. This allows reptiles to reproduce on land without needing water."},
{q:"Which class of vertebrates has pneumatic (hollow) bones?",o:["Aves (Birds)","Mammalia","Reptilia","Amphibia"],a:0,e:"Birds (Aves) have pneumatic bones containing air cavities. This significantly reduces body weight, making flight easier. The air spaces are connected to the air sac system."},
{q:"Which sub-group of mammals lays eggs instead of giving birth to live young?",o:["Monotremes","Marsupials","Placentals","Cetaceans"],a:0,e:"Monotremes are the only egg-laying mammals. Examples include the platypus and echidna. Most other mammals are either marsupials (give birth to very undeveloped young) or placentals (give birth to well-developed young)."},
{q:"What type of circulatory system do all vertebrates possess?",o:["Open circulatory system","Closed circulatory system with a ventral heart","Semi-closed circulatory system","No circulatory system"],a:1,e:"All vertebrates have a closed circulatory system where blood is confined within blood vessels. The heart is ventral (positioned on the underside), unlike invertebrates that may have dorsal hearts."},
{q:"In sharks, the skeleton is made of:",o:["Bone","Cartilage","Chitin","Calcium carbonate"],a:1,e:"Sharks belong to Class Chondrichthyes and have a cartilaginous skeleton (made of cartilage, not bone). Bony fishes (Class Osteichthyes) have skeletons made of bone."},
{q:"The lateral line system in fishes is used for:",o:["Digestion","Detecting water vibrations and pressure changes","Reproduction","Buoyancy regulation"],a:1,e:"The lateral line system is a sensory system found along the sides of fishes. It detects vibrations, pressure changes, and movement in the surrounding water, helping fish avoid predators and locate prey."},
{q:"Amphibians undergo which unique developmental process?",o:["Moulting","Metamorphosis","Parthenogenesis","Sporulation"],a:1,e:"Amphibians undergo metamorphosis — a remarkable transformation from the aquatic larval stage (tadpole with gills and tail) to the adult form (lungs and limbs). This is a defining characteristic of Class Amphibia."},
{q:"The tympanic membrane visible on a frog is functionally equivalent to what structure in humans?",o:["Nose","Eardrum","Eye lens","Throat"],a:1,e:"The tympanic membrane in frogs is equivalent to the human eardrum. It is a visible circular disc behind the eye that detects sound vibrations and is part of the frog's hearing apparatus."},
{q:"Reptiles maintain their body temperature mainly through:",o:["Internal metabolic heat (endothermy)","Behavioural thermoregulation (e.g., basking in sunlight)","Sweating","Shivering"],a:1,e:"Although reptiles are ectothermic (cold-blooded), they regulate body temperature through behaviour — for example, basking in the sun to warm up or moving to shade to cool down. This is called behavioural thermoregulation."},
{q:"Birds respire using lungs AND which additional structures?",o:["Gills","Air sacs (double respiration system)","Swim bladder","Book lungs"],a:1,e:"Birds have a highly efficient 'double respiration' system using lungs AND air sacs. Air flows through the lungs in one direction (unidirectional flow) during both inhalation and exhalation, making gas exchange very efficient for the high energy demands of flight."},
{q:"What is the function of the uropygial gland in birds?",o:["Digestion of food","Preening (waterproofing and maintaining feathers)","Flight control","Sound production"],a:1,e:"The uropygial gland (preen gland) is located at the base of a bird's tail. Birds use their beak to spread oil from this gland over their feathers during preening, which waterproofs and maintains feather structure."},
{q:"Mammals are uniquely characterized by the presence of:",o:["Scales","Mammary glands that produce milk","Feathers","Two-chambered heart"],a:1,e:"The presence of mammary glands is the defining characteristic of Class Mammalia. These glands produce milk to nourish offspring, providing them with nutrition and immunity. This is unique to mammals."},
{q:"In mammals, what separates the thoracic and abdominal cavities?",o:["Sternum","Diaphragm","Ribcage","Pelvis"],a:1,e:"The diaphragm is a muscular sheet that separates the thorax (chest cavity) from the abdomen. It plays a crucial role in breathing by contracting and relaxing to change the volume of the chest cavity, drawing air in and out of the lungs."},
{q:"Warm-blooded animals that maintain a constant body temperature are described as:",o:["Poikilothermic","Ectothermic","Homeothermic (endothermic)","Exothermic"],a:2,e:"Homeothermic (or endothermic) animals maintain a constant internal body temperature regardless of the external environment. Birds and mammals are warm-blooded. This requires more energy but allows activity in varied climates."},
{q:"What is unique about the heart of crocodiles among reptiles?",o:["Two-chambered","Three-chambered","Four-chambered (like birds and mammals)","No heart"],a:2,e:"Unlike other reptiles that have a three-chambered heart with incomplete separation, crocodiles have a fully four-chambered heart, similar to birds and mammals. This is thought to be an evolutionary adaptation related to their active predatory lifestyle."},
{q:"Which sensory organ in sharks detects electric fields produced by prey?",o:["Lateral line","Olfactory bulb","Ampullae of Lorenzini","Operculum"],a:2,e:"The ampullae of Lorenzini are electroreceptor organs found in sharks and related cartilaginous fishes. They detect weak electric fields generated by the muscle contractions of nearby animals, helping sharks locate hidden prey."},
{q:"The forelimbs of birds are modified into:",o:["Flippers","Claws","Wings","Tentacles"],a:2,e:"In birds (Aves), the forelimbs are modified into wings — one of their most distinctive adaptations for flight. The wing structure consists of modified bones comparable to the human arm but restructured for aerodynamic efficiency."},
{q:"Which type of dentition do mammals have, where different teeth have different shapes and functions?",o:["Homodont dentition","Acrodont dentition","Heterodont dentition","Pleurodont dentition"],a:2,e:"Mammals have heterodont dentition — their teeth are of different types (incisors, canines, premolars, molars) each adapted for specific functions such as cutting, tearing, or grinding food. This is distinct from reptiles which have homodont dentition (teeth all the same shape)."},
{q:"Freshwater fishes deal with osmotic challenges by:",o:["Drinking lots of water and excreting little urine","Absorbing salt from the water","Producing large amounts of dilute urine","Excreting excess salt through gills only"],a:2,e:"Freshwater fishes live in a hypotonic environment (less salty than their bodies), so water constantly enters their bodies by osmosis. To compensate, they produce large volumes of very dilute urine to expel the excess water."},
{q:"Which feature is present only during the embryonic stage of vertebrates and is replaced in adults?",o:["Vertebral column","Cranium","Notochord","Spinal cord"],a:2,e:"The notochord is a flexible rod-like structure present in all chordate embryos. In vertebrates, it is replaced by the vertebral column (backbone) as the animal matures. It only persists in adults as remnants between vertebral discs."},
{q:"What is 'cutaneous respiration' as seen in amphibians?",o:["Breathing through gills","Breathing through lungs","Gas exchange through the moist skin","Breathing through the mouth only"],a:2,e:"Cutaneous respiration is the process of gas exchange (oxygen and carbon dioxide) through the skin. In amphibians, the moist, thin, glandular skin is richly supplied with blood vessels and serves as an important respiratory surface, especially during hibernation or underwater."},
{q:"Which class of vertebrates includes the first animals to transition from aquatic to terrestrial life?",o:["Pisces","Reptilia","Amphibia","Aves"],a:2,e:"Amphibia represents the first vertebrates to successfully live on land, making them a transitional group between fully aquatic (fish) and fully terrestrial (reptiles) vertebrates. They still depend on water for reproduction and larval development."},
{q:"What is 'autotomy' as observed in lizards?",o:["Growing a new tail from birth","Regenerating lost limbs","The ability to voluntarily shed the tail as a defence mechanism","Changing skin colour"],a:2,e:"Autotomy is the ability of lizards to voluntarily detach (shed) their tail when grabbed by a predator. The tail may wriggle to distract the predator while the lizard escapes. The tail can later regenerate, though the regenerated tail is usually made of cartilage rather than bone."},
{q:"Marine fishes deal with salt concentration by:",o:["Producing dilute urine","Absorbing fresh water from food only","Drinking seawater and actively excreting excess salt through gills","Reducing all metabolic activity"],a:2,e:"Marine fishes live in a hypertonic environment (saltier than their bodies), so they constantly lose water by osmosis. To compensate, they drink large amounts of seawater and actively excrete excess salt through specialized cells in their gills and produce small amounts of concentrated urine."},
{q:"The 'keel' (enlarged sternum) in birds is important because it:",o:["Protects the heart","Stores food","Provides attachment for powerful pectoral (flight) muscles","Aids in egg laying"],a:2,e:"The keel is an extended projection of the sternum (breastbone) in birds. It provides a large surface area for the attachment of the powerful pectoral muscles responsible for the flapping wing movements used in flight. Flightless birds (like ostriches) have a reduced keel."},
{q:"Bipedal locomotion in humans is significant because it:",o:["Allows faster running than quadrupeds","Allows swimming efficiency","Frees the forelimbs for tool manipulation and fine motor tasks","Reduces brain size"],a:2,e:"Bipedal locomotion (walking on two legs) in humans frees the forelimbs (arms and hands) for tool use, object manipulation, and other complex tasks. Combined with opposable thumbs and a large brain, bipedalism is fundamental to human intelligence and culture."},
{q:"The nictitating membrane in frogs is a:",o:["Poison gland","Respiratory membrane","Transparent third eyelid that protects the eye","Tympanic covering"],a:2,e:"The nictitating membrane is a transparent or translucent third eyelid in frogs (and some other animals). It can be drawn across the eye to protect and moisten it while still allowing vision — useful when the frog is in water or in potentially harmful environments."},
{q:"Which feature of birds makes their skeleton lightweight for flight?",o:["Solid dense bones","Bones made of cartilage","Pneumatic bones containing air cavities","Reduced number of bones"],a:2,e:"Birds have pneumatic bones — hollow bones with internal struts that are connected to the air sac system. This makes the skeleton extremely lightweight without sacrificing strength, which is essential for reducing the energy cost of flight."},
{q:"Which class of vertebrates is fully ectothermic, has dry horny scales, and reproduces via amniotic eggs?",o:["Amphibia","Pisces","Aves","Reptilia"],a:3,e:"Reptilia are fully terrestrial, cold-blooded (ectothermic), have dry horny scales that prevent water loss, and reproduce using amniotic eggs with leathery shells. These adaptations make them well-suited for completely terrestrial life."},
{q:"Snakes differ from most reptiles because they lack:",o:["Scales","Internal fertilization","A vertebral column","Paired appendages (limbs)"],a:3,e:"Snakes are limbless reptiles — they lack the paired appendages (limbs) found in most other reptiles. They have vestigial remnants of a pelvic girdle internally in some species (like pythons), but external limbs are completely absent."},
{q:"The operculum in bony fishes is:",o:["A type of scale","A fin","A swim bladder component","A bony flap covering the gills"],a:3,e:"The operculum is a hard bony flap that covers and protects the gills in bony fishes. It also plays a role in ventilating the gills by pumping water over them. Cartilaginous fishes like sharks lack an operculum and have exposed gill slits instead."},
{q:"Excretion in vertebrates is primarily carried out by:",o:["Skin","Gills","Liver","Kidneys"],a:3,e:"Kidneys are the primary excretory organs in vertebrates. They filter blood, removing metabolic waste products (especially nitrogenous waste like urea or uric acid) and excess water and salts, producing urine that is excreted from the body."},
{q:"The placenta in most mammals serves what vital function?",o:["Produces milk for young","Regulates body temperature","Provides attachment for flight muscles","Nourishes the developing embryo and facilitates gas exchange"],a:3,e:"The placenta is a specialized organ in most (placental) mammals that connects the developing embryo to the mother's uterine wall. It allows the transfer of nutrients, oxygen, and antibodies from mother to fetus, and removes waste products from the fetus."},
{q:"Which of the following is a correct example of Class Aves?",o:["Tilapia","Toad","Salamander","Pigeon"],a:3,e:"The pigeon is a bird (Class Aves). Tilapia is a fish (Class Pisces), toad belongs to Class Amphibia, and salamander is also an amphibian. Birds are characterized by feathers, wings, beaks, and four-chambered hearts."},
{q:"The pinna in mammals refers to:",o:["The tail fin","A type of scale","Mammary gland","The external ear (ear flap)"],a:3,e:"The pinna (plural: pinnae) is the visible external part of the ear found in mammals. It is made of cartilage covered by skin and serves to collect sound waves and direct them into the ear canal. This is a distinctive mammalian feature."},
{q:"Sharks use their ampullae of Lorenzini to detect:",o:["Temperature only","Light intensity","Sound frequency","Electric fields produced by living organisms"],a:3,e:"The ampullae of Lorenzini are gel-filled sensory organs in sharks that are extremely sensitive to weak electric fields. All living organisms produce small electric fields when their muscles contract. Sharks use this sense (electroreception) to detect hidden or buried prey with great precision."},
{q:"Which vertebrate class undergoes NO metamorphosis and lays eggs with leathery shells?",o:["Amphibia","Pisces","Aves","Reptilia"],a:3,e:"Reptiles do not undergo metamorphosis — the juvenile that hatches from the egg is a miniature version of the adult. Their eggs have leathery shells that protect the developing embryo from desiccation while allowing gas exchange, enabling fully terrestrial reproduction."},
{q:"Heterodont dentition found in mammals — which tooth type is primarily for tearing food?",o:["Incisors","Premolars","Molars","Canines"],a:3,e:"Canines (also called cuspids or fangs) are the pointed teeth in mammals designed for gripping and tearing food, especially meat. Incisors are for cutting/biting, while premolars and molars are for crushing and grinding food."},
{q:"Double respiration in birds means that:",o:["Birds breathe twice as fast as mammals","Birds have two sets of lungs","Birds breathe only through their skin","Gas exchange occurs during BOTH inhalation and exhalation, maximising oxygen extraction"],a:3,e:"In birds, the air sac system creates a unidirectional flow of air through the lungs. Unlike mammals where gas exchange only occurs during inhalation, birds extract oxygen from air continuously during both inhalation and exhalation. This makes their respiratory system the most efficient among vertebrates."},
{q:"Which of the following correctly describes monotremes?",o:["They are marsupial mammals","They are fully aquatic mammals","They are placental mammals with advanced brains","Egg-laying mammals (e.g., platypus, echidna)"],a:3,e:"Monotremes are the most primitive group of living mammals. Unlike all other mammals, they lay eggs rather than giving birth to live young. After hatching, the young are fed milk from mammary glands (without nipples — milk seeps through the skin). Examples are the platypus and echidna."},
{q:"The contour feathers of birds primarily serve which function?",o:["Insulation","Balance during walking","Waterproofing","Flight and giving the bird its streamlined shape"],a:3,e:"Contour feathers are the large, stiff outer feathers of a bird. They give the bird its streamlined aerodynamic shape and are essential for flight. Down feathers (found beneath contour feathers) provide insulation, while filoplumes are sensory feathers."},
{q:"A vertebrate with a moist glandular skin, three-chambered heart, and that undergoes external fertilization most likely belongs to which class?",o:["Reptilia","Aves","Mammalia","Amphibia"],a:3,e:"All three features — moist glandular skin (no scales), three-chambered heart, and external fertilization — are characteristic of Class Amphibia. Their moist skin is used for cutaneous respiration, and their three-chambered heart has two atria and one ventricle."},
{q:"What is the term for the ability of birds to maintain a constant warm body temperature despite external temperature changes?",o:["Poikilothermy","Ectothermy","Osmoregulation","Homoiothermy (Endothermy)"],a:3,e:"Homoiothermy (also called endothermy or being warm-blooded) is the ability to maintain a constant internal body temperature through metabolic heat production, regardless of external temperatures. This is characteristic of both birds and mammals and requires a high metabolic rate."},
{q:"In the Linnaean taxonomic hierarchy, which rank comes immediately ABOVE Phylum?",o:["Kingdom","Order","Class","Family"],a:0,e:"The hierarchy from broadest to most specific is: Domain → Kingdom → Phylum → Class → Order → Family → Genus → Species. Kingdom is directly above Phylum."},
{q:"Animals are best described as organisms that are:",o:["Multicellular, eukaryotic, and heterotrophic","Unicellular, prokaryotic, and autotrophic","Multicellular, prokaryotic, and autotrophic","Unicellular, eukaryotic, and heterotrophic"],a:0,e:"Animals (Kingdom Animalia) are multicellular, eukaryotic organisms that are heterotrophic (they ingest food rather than produce it) and are generally motile at some life stage."},
{q:"Phylum Porifera (sponges) is characterized by having:",o:["No true tissues or organs; cellular level of organization only","A gastrovascular cavity and radial symmetry","A complete digestive tract and bilateral symmetry","Segmented body with a closed circulatory system"],a:0,e:"Porifera are the most primitive animals — they have no true tissues or organs. Their body is organized at the cellular level, full of pores (ostia), with choanocytes (collar cells) for filter feeding."},
{q:"The stinging cells unique to Phylum Cnidaria are called:",o:["Cnidocytes","Choanocytes","Flame cells","Spicules"],a:0,e:"Cnidocytes are specialized stinging cells found only in Cnidaria (jellyfish, hydra, corals). They contain nematocysts used for prey capture and defense. Choanocytes are feeding cells in sponges."},
{q:"Which of the following is NOT a key characteristic of all Chordates?",o:["Exoskeleton made of chitin","Notochord (at least at some stage)","Dorsal hollow nerve cord","Post-anal tail"],a:0,e:"The four defining chordate features are: notochord, dorsal hollow nerve cord, pharyngeal slits, and post-anal tail. A chitinous exoskeleton is characteristic of Arthropoda, not Chordata."},
{q:"Bony fishes (Osteichthyes) possess which structure used for controlling buoyancy?",o:["Swim bladder","Lateral line only","Placoid scales","Operculum"],a:0,e:"The swim bladder is a gas-filled sac in bony fishes (Osteichthyes) that regulates buoyancy, allowing the fish to maintain depth without constant swimming. Cartilaginous fishes (sharks) lack it."},
{q:"Amphibians are described as a 'transitional group' because they:",o:["Were the first vertebrates to live on land, bridging aquatic and terrestrial life","Are fully aquatic throughout their lives","Have dry scaly skin like reptiles","Lay hard-shelled amniotic eggs"],a:0,e:"Amphibians represent a critical evolutionary transition — adults can live on land and breathe with lungs, but they return to water for reproduction. Tadpole larvae are fully aquatic and breathe with gills."},
{q:"The amniotic egg of reptiles is significant because:",o:["It allows reproduction independent of water, with protective membranes (amnion, chorion, allantois) and a leathery shell","It must be laid in water to prevent desiccation","It has no shell and requires parental incubation","It contains a larval (tadpole) stage"],a:0,e:"The amniotic egg was a key evolutionary innovation — membranes (amnion, chorion, allantois) protect and nourish the embryo, while the leathery shell prevents water loss. This freed reptiles completely from aquatic reproduction."},
{q:"Birds (Class Aves) have a four-chambered heart and are classified as:",o:["Endothermic (warm-blooded, homoiothermic)","Ectothermic (cold-blooded, poikilothermic)","Poikilothermic with variable temperature","Partially endothermic only in flight"],a:0,e:"Birds are endothermic (warm-blooded) — they maintain a constant high body temperature regardless of the environment. This, combined with high metabolic rate and air sacs, supports the enormous energy demands of flight."},
{q:"Which feature is UNIQUE to mammals and not found in any other vertebrate class?",o:["Mammary glands that produce milk to nourish young","Four-chambered heart","Endothermy (warm-bloodedness)","Internal fertilization"],a:0,e:"Mammary glands are the defining feature of Class Mammalia — the name itself comes from 'mamma' (breast). While birds also have four-chambered hearts and are endothermic, only mammals have mammary glands."},
{q:"Phylum Platyhelminthes (flatworms) are described as acoelomate, meaning they:",o:["Have a true coelom lined by mesoderm","Have no body cavity (no coelom)","Have a pseudocoelom only","Have multiple body cavities"],a:1,e:"Acoelomate means the organism lacks a true body cavity between the body wall and gut. Platyhelminthes have solid mesoderm filling this space. Compare: Nematoda are pseudocoelomate; Annelida–Chordata are eucoelomate."},
{q:"Nematoda (roundworms) differ from Annelida (segmented worms) in that Nematoda:",o:["Have a closed circulatory system","Are unsegmented and pseudocoelomate","Have setae for locomotion","Are always free-living, never parasitic"],a:1,e:"Nematodes are cylindrical, unsegmented worms with a pseudocoelom (body cavity not fully lined by mesoderm). Annelids have true segmentation (metamerism), a true coelom, and a closed circulatory system."},
{q:"The water vascular system, which operates tube feet for locomotion, is characteristic of Phylum:",o:["Mollusca","Echinodermata","Annelida","Arthropoda"],a:1,e:"The water vascular system is unique to Echinodermata (starfish, sea urchins, sea cucumbers). Seawater enters through the madreporite and is pumped through canals to operate hydraulic tube feet for movement and feeding."},
{q:"The phylum with the LARGEST number of known animal species, owing to its chitinous exoskeleton and jointed appendages, is:",o:["Chordata","Arthropoda","Mollusca","Nematoda"],a:1,e:"Arthropoda is the largest animal phylum by species count (over 1 million described). It includes insects, spiders, crustaceans, and millipedes — all unified by their chitinous exoskeleton and jointed appendages."},
{q:"In cladistics, modern taxonomy groups birds WITHIN Reptilia because:",o:["Birds have scales on their legs like reptiles","The traditional Reptilia is paraphyletic if birds are excluded — cladistics requires monophyletic groups","Birds lay eggs like reptiles","Birds are ectothermic like most reptiles"],a:1,e:"Cladistics demands monophyletic groups (all descendants of a common ancestor). Traditional Reptilia is paraphyletic because it includes the common ancestor but excludes birds. Modern cladistics places birds within Reptilia (as Archosauria)."},
{q:"The lateral line system in fish is used primarily to:",o:["Regulate buoyancy","Detect pressure changes and vibrations in the water","Filter food particles","Excrete excess salts"],a:1,e:"The lateral line is a mechanosensory system running along the fish's side. It detects water pressure changes, vibrations, and movement — helping fish sense predators, prey, and school with other fish in murky water."},
{q:"Cutaneous respiration in adult amphibians refers to:",o:["Breathing only through gills","Gas exchange occurring through the moist skin","Breathing through the swim bladder","Respiration via book lungs"],a:1,e:"Cutaneous respiration = gas exchange through the skin. Amphibians have thin, moist, highly vascularised skin that allows oxygen and CO₂ to diffuse in and out. This supplements lung breathing, especially during hibernation."},
{q:"The Subphylum Cephalochordata (e.g., Amphioxus/Branchiostoma) differs from vertebrates in that it:",o:["Has no notochord at any stage","Retains the notochord throughout life but never develops a true vertebral column","Has a well-developed skull and brain","Is exclusively terrestrial"],a:1,e:"Cephalochordates (lancelets like Branchiostoma) are fish-like marine animals that retain the notochord from head to tail throughout their entire lives — they never develop a vertebral column or true skull (unlike Vertebrata)."},
{q:"Reptiles are described as ectothermic. This means they:",o:["Generate heat internally to maintain constant body temperature","Rely on external environmental heat sources to regulate body temperature","Cannot survive in hot climates","Maintain body temperature through metabolic heat alone"],a:1,e:"Ectothermic ('cold-blooded') animals rely on external h"}
]; // Note: truncated - full HTML has 200 questions
</script>
