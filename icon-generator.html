<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PWA Icon Generator</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      background: #0f172a;
      color: #e2e8f0;
    }
    h1 { color: #818cf8; }
    .upload-area {
      border: 3px dashed #818cf8;
      border-radius: 10px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      margin: 20px 0;
    }
    .upload-area:hover { background: rgba(129, 140, 248, 0.1); }
    #preview { max-width: 200px; margin: 20px 0; }
    .sizes { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin: 20px 0; }
    .size-card {
      background: #1e293b;
      border-radius: 8px;
      padding: 15px;
      text-align: center;
    }
    .size-card canvas { max-width: 100%; height: auto; border-radius: 4px; }
    .download-btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 16px;
      background: #818cf8;
      color: #0f172a;
      text-decoration: none;
      border-radius: 4px;
      font-weight: bold;
    }
    #downloadAll {
      display: block;
      width: 100%;
      padding: 15px;
      margin: 20px 0;
      font-size: 16px;
      background: #818cf8;
      color: #0f172a;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>📱 PWA Icon Generator</h1>
  <p>Upload your logo image and download all required icon sizes</p>
  
  <div class="upload-area" onclick="document.getElementById('fileInput').click()">
    <p>Click here or drag and drop your logo image</p>
    <input type="file" id="fileInput" accept="image/*" style="display:none">
  </div>
  
  <div id="results" style="display:none;">
    <img id="preview" />
    <button id="downloadAll" onclick="downloadAll()">⬇️ Download All Icons (ZIP)</button>
    <div class="sizes" id="sizes"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script>
    const sizes = [
      { name: 'icon-16', size: 16 },
      { name: 'icon-32', size: 32 },
      { name: 'icon-96', size: 96 },
      { name: 'icon-152', size: 152 },
      { name: 'icon-167', size: 167 },
      { name: 'icon-180', size: 180 },
      { name: 'icon-192', size: 192 },
      { name: 'icon-512', size: 512 },
      { name: 'icon-192-maskable', size: 192, padding: true },
      { name: 'icon-512-maskable', size: 512, padding: true },
      { name: 'favicon', size: 32, ico: true },
    ];
    
    let originalImage = null;
    const generatedCanvases = {};

    document.getElementById('fileInput').addEventListener('change', handleFile);
    
    function handleFile(e) {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = (event) => {
        originalImage = new Image();
        originalImage.onload = () => {
          document.getElementById('preview').src = originalImage.src;
          document.getElementById('results').style.display = 'block';
          generateIcons();
        };
        originalImage.src = event.target.result;
      };
      reader.readAsDataURL(file);
    }
    
    function generateIcons() {
      const container = document.getElementById('sizes');
      container.innerHTML = '';
      
      sizes.forEach(({ name, size, padding, ico }) => {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        
        // Background
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(0, 0, size, size);
        
        // Draw image with optional padding for maskable icons
        const paddingPixels = padding ? size * 0.1 : 0;
        const drawSize = size - (paddingPixels * 2);
        
        // Center and cover
        const scale = Math.max(drawSize / originalImage.width, drawSize / originalImage.height);
        const x = (size - originalImage.width * scale) / 2;
        const y = (size - originalImage.height * scale) / 2;
        
        ctx.drawImage(originalImage, x, y, originalImage.width * scale, originalImage.height * scale);
        
        generatedCanvases[name] = { canvas, ico };
        
        const card = document.createElement('div');
        card.className = 'size-card';
        const ext = ico ? 'ico' : 'png';
        card.innerHTML = `
          <canvas id="canvas-${name}" width="${size}" height="${size}"></canvas>
          <p>${name}.${ext} (${size}x${size})</p>
          <a href="#" class="download-btn" onclick="downloadIcon('${name}'); return false;">Download</a>
        `;
        container.appendChild(card);
        
        // Copy to preview canvas
        const previewCanvas = card.querySelector('canvas');
        previewCanvas.getContext('2d').drawImage(canvas, 0, 0);
      });
    }
    
    // Convert PNG to ICO format
    function canvasToIco(canvas) {
      const ctx = canvas.getContext('2d');
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const pixels = imageData.data;
      const width = canvas.width;
      const height = canvas.height;
      
      // BMP header for ICO
      const bmpHeaderSize = 40;
      const pixelDataSize = width * height * 4;
      const andMaskSize = Math.ceil(width / 32) * 4 * height;
      const totalSize = bmpHeaderSize + pixelDataSize + andMaskSize;
      
      const buffer = new ArrayBuffer(6 + 16 + totalSize);
      const view = new DataView(buffer);
      let offset = 0;
      
      // ICO header
      view.setUint16(offset, 0, true); offset += 2; // Reserved
      view.setUint16(offset, 1, true); offset += 2; // Type (1 = icon)
      view.setUint16(offset, 1, true); offset += 2; // Count
      
      // ICONDIRENTRY
      view.setUint8(offset++, width > 255 ? 0 : width); // Width
      view.setUint8(offset++, height > 255 ? 0 : height); // Height
      view.setUint8(offset++, 0); // Colors (0 = >256)
      view.setUint8(offset++, 0); // Reserved
      view.setUint16(offset, 1, true); offset += 2; // Color planes
      view.setUint16(offset, 32, true); offset += 2; // Bits per pixel
      view.setUint32(offset, totalSize, true); offset += 4; // Size of image data
      view.setUint32(offset, 6 + 16, true); offset += 4; // Offset to image data
      
      // BITMAPINFOHEADER
      view.setUint32(offset, 40, true); offset += 4; // Header size
      view.setInt32(offset, width, true); offset += 4; // Width
      view.setInt32(offset, height * 2, true); offset += 4; // Height (doubled for XOR+AND)
      view.setUint16(offset, 1, true); offset += 2; // Planes
      view.setUint16(offset, 32, true); offset += 2; // Bits per pixel
      view.setUint32(offset, 0, true); offset += 4; // Compression (0 = none)
      view.setUint32(offset, 0, true); offset += 4; // Size (0 for uncompressed)
      view.setInt32(offset, 0, true); offset += 4; // X pixels per meter
      view.setInt32(offset, 0, true); offset += 4; // Y pixels per meter
      view.setUint32(offset, 0, true); offset += 4; // Colors used
      view.setUint32(offset, 0, true); offset += 4; // Important colors
      
      // Write pixel data (BGRA format, bottom-up)
      for (let y = height - 1; y >= 0; y--) {
        for (let x = 0; x < width; x++) {
          const i = (y * width + x) * 4;
          view.setUint8(offset++, pixels[i + 2]); // B
          view.setUint8(offset++, pixels[i + 1]); // G
          view.setUint8(offset++, pixels[i]);     // R
          view.setUint8(offset++, pixels[i + 3]); // A
        }
      }
      
      // AND mask (1 bit per pixel, all transparent)
      for (let i = 0; i < andMaskSize; i++) {
        view.setUint8(offset++, 0);
      }
      
      return new Blob([buffer], { type: 'image/x-icon' });
    }
    
    function downloadIcon(name) {
      const { canvas, ico } = generatedCanvases[name];
      const link = document.createElement('a');
      
      if (ico) {
        const blob = canvasToIco(canvas);
        link.download = `${name}.ico`;
        link.href = URL.createObjectURL(blob);
      } else {
        link.download = `${name}.png`;
        link.href = canvas.toDataURL('image/png');
      }
      link.click();
    }
    
    async function downloadAll() {
      const zip = new JSZip();
      const folder = zip.folder('icons');
      
      for (const [name, { canvas, ico }] of Object.entries(generatedCanvases)) {
        if (ico) {
          const blob = canvasToIco(canvas);
          const arrayBuffer = await blob.arrayBuffer();
          const uint8Array = new Uint8Array(arrayBuffer);
          folder.file(`${name}.ico`, uint8Array);
        } else {
          const dataUrl = canvas.toDataURL('image/png');
          const base64Data = dataUrl.split(',')[1];
          folder.file(`${name}.png`, base64Data, { base64: true });
        }
      }
      
      zip.generateAsync({ type: 'blob' }).then((content) => {
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = 'pwa-icons.zip';
        link.click();
      });
    }
  </script>
</body>
</html>
